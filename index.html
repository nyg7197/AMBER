<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMBER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant:wght@300&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #080808;
  color: #fff;
  font-family: 'Cormorant Garamond', Georgia, serif;
  overflow: hidden;
  cursor: none;
}
body.unlocked { overflow-x: hidden; overflow-y: auto; }

/* ── Cursor ─────────────────────────────────────────────────────────── */
#cursor-ring {
  position: fixed; width: 32px; height: 32px;
  border: 1px solid rgba(255,255,255,0.5); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width .35s ease, height .35s ease, border-color .35s ease;
  mix-blend-mode: difference;
}
#cursor-dot {
  position: fixed; width: 4px; height: 4px;
  background: #fff; border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  mix-blend-mode: difference;
}
#cursor-ring.hovering { width: 52px; height: 52px; border-color: rgba(255,255,255,0.25); }

/* ── Grain ──────────────────────────────────────────────────────────── */
#grain {
  position: fixed; inset: -50%; width: 200%; height: 200%;
  pointer-events: none; z-index: 8000; opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  animation: grain-shift .12s steps(1) infinite;
}
@keyframes grain-shift {
  0%   { transform:translate(0,0); }       10% { transform:translate(-3%,-4%); }
  20%  { transform:translate(-6%, 2%); }   30% { transform:translate( 3%,-5%); }
  40%  { transform:translate(-2%, 6%); }   50% { transform:translate(-5%, 0%); }
  60%  { transform:translate( 4%, 3%); }   70% { transform:translate( 0%,-4%); }
  80%  { transform:translate(-3%, 5%); }   90% { transform:translate( 5%,-2%); }
  100% { transform:translate(0,0); }
}

/* ── Vignette ───────────────────────────────────────────────────────── */
#vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 7000;
  background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.75) 100%);
}

/* ── Intro ──────────────────────────────────────────────────────────── */
#intro {
  position: fixed; inset: 0; z-index: 6000; background: #080808;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 1.4s cubic-bezier(.4,0,.2,1);
}
.intro-eyebrow {
  font-size: .65rem; font-weight: 300; letter-spacing: .35em;
  text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: 2rem;
  opacity: 0; transform: translateY(12px);
  transition: opacity .9s ease, transform .9s ease;
}
.intro-eyebrow.reveal { opacity:1; transform:translateY(0); }
.intro-title {
  font-family: 'Cormorant', serif;
  font-size: clamp(5rem, 14vw, 14rem); font-weight: 300;
  letter-spacing: .06em; line-height: 1; color: rgba(255,255,255,.92);
  margin-bottom: .4rem;
  opacity: 0; transform: translateY(16px);
  transition: opacity 1.1s ease .2s, transform 1.1s ease .2s;
}
.intro-title.reveal { opacity:1; transform:translateY(0); }
.intro-subtitle {
  font-size: clamp(1.2rem, 2.4vw, 2rem); font-weight: 300; font-style: italic;
  letter-spacing: .15em; color: rgba(255,255,255,.25); margin-bottom: 3.5rem;
  opacity: 0; transform: translateY(12px);
  transition: opacity 1.1s ease .45s, transform 1.1s ease .45s;
}
.intro-subtitle.reveal { opacity:1; transform:translateY(0); }
.intro-divider {
  width:1px; height:0; background:rgba(255,255,255,.18);
  margin: 0 auto 3rem; transition: height 1.2s ease .6s;
}
.intro-divider.reveal { height:50px; }
#enter-btn {
  background:transparent; border:none; color:rgba(255,255,255,.45); padding:0;
  font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:300;
  letter-spacing:.4em; text-transform:uppercase; cursor:pointer; position:relative;
  opacity:0; transition:color .4s ease, opacity 1s ease .9s;
}
#enter-btn::after {
  content:''; position:absolute; bottom:-3px; left:0;
  width:0; height:1px; background:rgba(255,255,255,.4); transition:width .4s ease;
}
#enter-btn:hover { color:rgba(255,255,255,.8); }
#enter-btn:hover::after { width:100%; }
#enter-btn.reveal { opacity:1; }

/* ── Preface / instruction panel ────────────────────────────────────── */
#explore-prompt {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 5000;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.6rem;
  text-align: center;
  max-width: min(580px, 88vw);
  opacity: 0;
  transition: opacity 1.6s ease;
}
#explore-prompt.visible { opacity: 1; }

.ep-preface {
  font-family: 'Cormorant', serif;
  font-size: clamp(1rem, 1.6vw, 1.25rem);
  font-weight: 300; font-style: italic;
  letter-spacing: .04em; line-height: 1.9;
  color: rgba(255,255,255,.45);
}
.ep-divider {
  width: 28px; height: 1px;
  background: rgba(255,255,255,.15);
}
#explore-prompt.brief .ep-preface,
#explore-prompt.brief .ep-divider { display: none; }

.ep-instructions {
  font-size: clamp(.58rem, .9vw, .72rem);
  font-weight: 300; letter-spacing: .38em;
  text-transform: uppercase; line-height: 2.4;
  color: rgba(255,255,255,.2);
}
.ep-arrow {
  width: 1px; height: 22px; margin-top: .25rem;
  background: linear-gradient(to bottom, rgba(255,255,255,.18), transparent);
  animation: ep-pulse 2.4s ease-in-out infinite;
}
@keyframes ep-pulse { 0%,100%{opacity:.25;} 50%{opacity:.8;} }

/* ── Back button ────────────────────────────────────────────────────── */
#back-btn {
  position: fixed; top: 1.5rem; left: 1.5rem; z-index: 5000;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.45);
  border-radius: 2px; color: #fff;
  padding: .75rem 1.6rem;
  font-family: 'Cormorant Garamond', serif;
  font-size: .88rem; font-weight: 300;
  letter-spacing: .3em; text-transform: uppercase;
  cursor: pointer;
  transition: color .3s, background .3s, border-color .3s, opacity .6s;
  opacity: 0; pointer-events: none;
}
#back-btn:hover { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.9); }
#back-btn.visible { opacity: 1; pointer-events: auto; }

/* ── Gate nudge ─────────────────────────────────────────────────────── */
@keyframes gate-nudge {
  0%,100% { transform:scale(1);    opacity:.75; }
  25%      { transform:scale(1.2);  opacity:1;   }
  60%      { transform:scale(0.92); opacity:.85; }
  80%      { transform:scale(1.1);  opacity:1;   }
}
.play-btn.nudge { animation: gate-nudge .6s ease forwards; }
body.gate-locked { overflow: hidden !important; height: 100vh !important; }

/* ── Sound button ───────────────────────────────────────────────────── */
#sound-btn {
  position: fixed; top: 1.75rem; right: 1.75rem; z-index: 5000;
  background:transparent; border:none; color:rgba(255,255,255,.25); padding:0;
  font-family:'Cormorant Garamond',serif; font-size:.62rem; font-weight:300;
  letter-spacing:.35em; text-transform:uppercase; cursor:pointer; transition:color .35s;
}
#sound-btn:hover { color:rgba(255,255,255,.65); }
#sound-btn.on { color:rgba(255,255,255,.45); }

/* ── Progress ───────────────────────────────────────────────────────── */
.progress-bar {
  position:fixed; left:1.75rem; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; align-items:center; z-index:5000;
}
.progress-line-wrap { position:relative; width:1px; height:90px; background:rgba(255,255,255,.1); }
.progress-line-fill {
  position:absolute; top:0; left:0; width:1px; background:rgba(255,255,255,.65);
  transition:height .5s cubic-bezier(.4,0,.2,1); height:0%;
}
.progress-label {
  font-size:.58rem; letter-spacing:.2em; color:rgba(255,255,255,.2);
  writing-mode:vertical-rl; text-transform:uppercase;
  margin-top:10px; transition:color .4s;
}

/* ── Video tiles ─────────────────────────────────────────────────────── */
.bubble {
  position: absolute; overflow: hidden;
  pointer-events: none; z-index: 50;
  opacity: 0; transform: scale(.88) translateY(10px);
  transition: opacity .8s cubic-bezier(.4,0,.2,1),
              transform .8s cubic-bezier(.34,1.56,.64,1), filter .8s ease;
  filter: blur(2px) brightness(.6); mix-blend-mode: screen;
}
.bubble.visible { opacity: 1; transform: scale(1) translateY(0); filter: blur(0) brightness(.7); }
.bubble video { display: block; width: 100%; height: auto; }

/* ── Scroll container ───────────────────────────────────────────────── */
#scroll-container { position: relative; }

/* ── Explore zones ───────────────────────────────────────────────────── */
.explore-zone {
  height: 420vh;
  background: #080808;
  position: relative;
  z-index: 1;
}

/* ── Section wrapper ────────────────────────────────────────────────── */
.section-wrap {
  height: 220vh;
  position: relative;
  z-index: 200;
}

/* ── Video section ──────────────────────────────────────────────────── */
.section {
  position: sticky; top: 0; height: 100vh; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.section-video {
  width:100%; height:100%; object-fit:cover;
  position:absolute; inset:0;
  opacity:0; transform:scale(1.04);
  transition: opacity 2s cubic-bezier(.4,0,.2,1), transform 2.2s cubic-bezier(.4,0,.2,1);
}
.section-video.active { opacity:1; transform:scale(1); }
.section::after {
  content:''; position:absolute; inset:0; z-index:5; pointer-events:none;
  background: linear-gradient(to bottom,
    rgba(8,8,8,.3) 0%, rgba(8,8,8,.08) 35%,
    rgba(8,8,8,.08) 65%, rgba(8,8,8,.5) 100%);
}

/* ── Play prompt ────────────────────────────────────────────────────── */
.play-prompt {
  position: absolute; inset: 0; z-index: 20;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1.2rem; text-align: center;
  opacity: 0; pointer-events: none;
  transition: opacity 1.2s ease;
}
.play-prompt.visible { opacity: 1; pointer-events: auto; }
.play-prompt.gone    { opacity: 0; pointer-events: none; transition: opacity 4s ease; }

.play-btn {
  background: transparent; border: none; cursor: pointer; padding: 0;
  width: 60px; height: 60px; flex-shrink: 0;
  animation: play-breathe 3s ease-in-out infinite;
}
.play-btn svg { width: 60px; height: 60px; display: block; }
@keyframes play-breathe {
  0%,100% { transform:scale(1);   opacity:.75; }
  50%      { transform:scale(1.1); opacity:1;   }
}
.play-label {
  font-size: clamp(.72rem, 1.1vw, 1rem); font-weight: 300;
  letter-spacing: .45em; text-transform: uppercase; color: rgba(255,255,255,.28);
}

/* ── Scrubber ───────────────────────────────────────────────────────── */
.scrub-pp-btn {
  background: transparent; border: none; cursor: pointer; padding: 0;
  width: 22px; height: 22px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: .55; transition: opacity .2s;
}
.scrub-pp-btn:hover { opacity: 1; }
.scrub-pp-btn svg { width: 16px; height: 16px; display: block; }

.video-label {
  position:absolute; bottom:2rem; right:1.75rem; z-index:20;
  font-size:.58rem; font-weight:300; color:rgba(255,255,255,.18);
  letter-spacing:.3em; text-transform:uppercase; writing-mode:vertical-rl;
}

.video-scrubber {
  position: absolute; bottom: 3.5rem; left: 50%;
  transform: translateX(-50%);
  width: min(800px, 85%); z-index: 20;
  display: flex; align-items: center; gap: 1.4rem;
  opacity: 0; pointer-events: none;
  transition: opacity 1.2s ease;
}
.video-scrubber.visible  { opacity: 1; pointer-events: auto; }
.video-scrubber.scrub-idle { opacity: 0 !important; pointer-events: none !important; }

.scrub-track {
  flex: 1; height: 2px; background: rgba(255,255,255,.12);
  position: relative; cursor: pointer;
}
.scrub-track-inner { position: relative; height: 100%; background: rgba(255,255,255,.18); pointer-events: none; }
.scrub-fill {
  position: absolute; left: 0; top: 0; height: 100%; width: 0%;
  background: rgba(255,255,255,.9); pointer-events: none;
}
.scrub-thumb {
  position: absolute; top: 50%; width: 7px; height: 7px;
  border-radius: 50%; background: #fff;
  transform: translate(-50%, -50%) scale(0); pointer-events: none;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
}
.scrub-track:hover .scrub-thumb { transform: translate(-50%, -50%) scale(1); }
.scrub-time {
  font-family: 'Cormorant Garamond', serif;
  font-size: .52rem; letter-spacing: .18em;
  color: rgba(255,255,255,.28); min-width: 2.8rem; text-align: right;
  user-select: none;
}

</style>
</head>
<body>

<audio id="ambient-audio"
  src="https://res.cloudinary.com/dqzb0an9q/video/upload/v1776083427/ambient_sceemw.wav"
  loop preload="auto"></audio>

<div id="grain"></div>
<div id="vignette"></div>
<div id="cursor-ring"></div>
<div id="cursor-dot"></div>

<!-- ── Intro ──────────────────────────────────────────────────────────── -->
<div id="intro">
  <p class="intro-eyebrow" id="ey"></p>
  <h1 class="intro-title"   id="it">AMBER</h1>
  <p class="intro-subtitle" id="is">Nicolas Yan Garcia</p>
  <div class="intro-divider" id="id"></div>
  <button id="enter-btn">Enter</button>
</div>

<!-- ── Preface / instruction panel ───────────────────────────────────── -->
<div id="explore-prompt">
  <p class="ep-preface">
    AMBER is a web-based iteration of a mixed-media installation<br>
    exploring [your research question / theme of the work].
  </p>
  <div class="ep-divider"></div>
  <p class="ep-instructions">
    Click anywhere to reveal images<br>
    Scroll down to encounter each chapter
  </p>
  <div class="ep-arrow"></div>
</div>

<!-- ── Back button ────────────────────────────────────────────────────── -->
<button id="back-btn">&#8592; back</button>

<!-- ── Sound button ───────────────────────────────────────────────────── -->
<button id="sound-btn">Sound &mdash; off</button>

<!-- ── Progress bar ───────────────────────────────────────────────────── -->
<div class="progress-bar">
  <div class="progress-line-wrap">
    <div class="progress-line-fill" id="prog-fill"></div>
  </div>
  <span class="progress-label" id="prog-label">·</span>
</div>

<!-- ── Main scroll content ────────────────────────────────────────────── -->
<div id="scroll-container">

  <div class="explore-zone" id="explore-zone-1"></div>

  <div class="section-wrap" id="wrap1">
    <section class="section" id="section1">
      <video class="section-video" id="vid-main1" playsinline preload="auto" loop>
        <source src="https://res.cloudinary.com/dqzb0an9q/video/upload/v1776084066/AMBER_SCREEN_1.1-h264_ccxpov.mp4" type="video/mp4">
      </video>
      <div class="play-prompt" id="play-prompt1">
        <button class="play-btn" id="play-btn1" aria-label="Play">
          <svg viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="23" stroke="rgba(255,255,255,0.35)" stroke-width="0.75"/>
            <polygon points="20,15 34,24 20,33" fill="rgba(255,255,255,0.65)"/>
          </svg>
        </button>
        <p class="play-label">press to play</p>
      </div>
      <div class="video-scrubber" id="scrubber1">
        <button class="scrub-pp-btn" id="scrub-pp1" aria-label="Pause">
          <svg id="scrub-pp-icon1" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="2" width="3.5" height="12" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="9.5" y="2" width="3.5" height="12" rx="1" fill="rgba(255,255,255,0.8)"/>
          </svg>
        </button>
        <div class="scrub-track" id="scrub-track1">
          <div class="scrub-track-inner">
            <div class="scrub-fill" id="scrub-fill1"></div>
            <div class="scrub-thumb" id="scrub-thumb1"></div>
          </div>
        </div>
        <span class="scrub-time" id="scrub-time1">0:00</span>
      </div>
      <div class="video-label">01</div>
    </section>
  </div>

  <div class="explore-zone" id="explore-zone-2"></div>

  <div class="section-wrap" id="wrap2">
    <section class="section" id="section2">
      <video class="section-video" id="vid-main2" playsinline preload="auto" loop>
        <source src="https://res.cloudinary.com/dqzb0an9q/video/upload/v1776083478/AMBER_SCREEN_3.1-h264_odzszh.mp4" type="video/mp4">
      </video>
      <div class="play-prompt" id="play-prompt2">
        <button class="play-btn" id="play-btn2" aria-label="Play">
          <svg viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="23" stroke="rgba(255,255,255,0.35)" stroke-width="0.75"/>
            <polygon points="20,15 34,24 20,33" fill="rgba(255,255,255,0.65)"/>
          </svg>
        </button>
        <p class="play-label">press to play</p>
      </div>
      <div class="video-scrubber" id="scrubber2">
        <button class="scrub-pp-btn" id="scrub-pp2" aria-label="Pause">
          <svg id="scrub-pp-icon2" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="2" width="3.5" height="12" rx="1" fill="rgba(255,255,255,0.8)"/>
            <rect x="9.5" y="2" width="3.5" height="12" rx="1" fill="rgba(255,255,255,0.8)"/>
          </svg>
        </button>
        <div class="scrub-track" id="scrub-track2">
          <div class="scrub-track-inner">
            <div class="scrub-fill" id="scrub-fill2"></div>
            <div class="scrub-thumb" id="scrub-thumb2"></div>
          </div>
        </div>
        <span class="scrub-time" id="scrub-time2">0:00</span>
      </div>
      <div class="video-label">02</div>
    </section>
  </div>

</div><!-- end scroll-container -->

<script>
/* ─────────────────────────────────────────────────────────────────────
   INIT
───────────────────────────────────────────────────────────────────── */
if (history.scrollRestoration) history.scrollRestoration = 'manual';
window.scrollTo(0, 0);

/* ─────────────────────────────────────────────────────────────────────
   VOLUME FADE
───────────────────────────────────────────────────────────────────── */
function fadeTo(target, toVol, duration) {
  if (target._fadeRAF) cancelAnimationFrame(target._fadeRAF);
  const fromVol = target.volume, start = performance.now();
  function step(now) {
    const t    = Math.min((now - start) / duration, 1);
    const ease = t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    target.volume = Math.max(0, Math.min(1, fromVol + (toVol - fromVol) * ease));
    if (t < 1) target._fadeRAF = requestAnimationFrame(step);
  }
  target._fadeRAF = requestAnimationFrame(step);
}

/* ─────────────────────────────────────────────────────────────────────
   AUDIO STATE
───────────────────────────────────────────────────────────────────── */
const ambientAudio = document.getElementById('ambient-audio');
const vid1 = document.getElementById('vid-main1');
const vid2 = document.getElementById('vid-main2');
ambientAudio.volume = 0; vid1.volume = 0; vid2.volume = 0;

let soundOn = false, activeAudio = null;
const FADE_OUT = 1800, FADE_IN = 2200;

function crossfadeTo(incoming) {
  if (!soundOn || incoming === activeAudio) return;
  activeAudio = incoming;
  if (incoming !== 'ambient') fadeTo(ambientAudio, 0, FADE_OUT);
  if (incoming !== 'vid1')    fadeTo(vid1, 0, FADE_OUT);
  if (incoming !== 'vid2')    fadeTo(vid2, 0, FADE_OUT);
  setTimeout(() => {
    if (!soundOn || activeAudio !== incoming) return;
    if (incoming === 'ambient') fadeTo(ambientAudio, 1, FADE_IN);
    if (incoming === 'vid1')    fadeTo(vid1, 1, FADE_IN);
    if (incoming === 'vid2')    fadeTo(vid2, 1, FADE_IN);
  }, 500);
}

/* ─────────────────────────────────────────────────────────────────────
   SOUND BUTTON
───────────────────────────────────────────────────────────────────── */
const soundBtn = document.getElementById('sound-btn');
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? 'Sound — on' : 'Sound — off';
  soundBtn.classList.toggle('on', soundOn);
  if (soundOn) {
    if (activeAudio === 'vid1')      fadeTo(vid1, 1, 1200);
    else if (activeAudio === 'vid2') fadeTo(vid2, 1, 1200);
    else { ambientAudio.play().catch(()=>{}); fadeTo(ambientAudio, 1, 1200); }
  } else {
    fadeTo(ambientAudio, 0, 800); fadeTo(vid1, 0, 800); fadeTo(vid2, 0, 800);
  }
});

/* ─────────────────────────────────────────────────────────────────────
   CURSOR
───────────────────────────────────────────────────────────────────── */
const ring = document.getElementById('cursor-ring');
const dot  = document.getElementById('cursor-dot');
let mx = window.innerWidth/2, my = window.innerHeight/2;
let ringX = mx, ringY = my;
let entered = false;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  dot.style.left = mx+'px'; dot.style.top = my+'px';
  if (entered) { resetIdleTimer(); resetScrubberIdle(); }
});

(function animRing() {
  ringX += (mx - ringX) * .12;
  ringY += (my - ringY) * .12;
  ring.style.left = ringX+'px'; ring.style.top = ringY+'px';
  requestAnimationFrame(animRing);
})();

document.querySelectorAll('button').forEach(b => {
  b.addEventListener('mouseenter', () => ring.classList.add('hovering'));
  b.addEventListener('mouseleave', () => ring.classList.remove('hovering'));
});

/* ─────────────────────────────────────────────────────────────────────
   PREFACE PANEL
───────────────────────────────────────────────────────────────────── */
const explorePrompt = document.getElementById('explore-prompt');

let tilesEnabled     = false;
let prefaceShownOnce = false;
let idleTimer        = null;
const IDLE_MS        = 2000;

function isInExploreZone() {
  for (const zone of document.querySelectorAll('.explore-zone')) {
    const r = zone.getBoundingClientRect();
    if (my >= r.top && my <= r.bottom && mx >= r.left && mx <= r.right) return true;
  }
  return false;
}

function isInChapterSection() {
  return ['wrap1','wrap2'].some(id => {
    const r = document.getElementById(id).getBoundingClientRect();
    return r.top < window.innerHeight * 0.9 && r.bottom > window.innerHeight * 0.1;
  });
}

function showPreface() {
  if (!entered || isInChapterSection()) return;
  if (prefaceShownOnce) {
    explorePrompt.classList.add('brief');
  } else {
    explorePrompt.classList.remove('brief');
    prefaceShownOnce = true;
  }
  explorePrompt.classList.add('visible');
}

function hidePreface() {
  explorePrompt.classList.remove('visible');
}

function resetIdleTimer() {
  if (tilesEnabled) hidePreface();
  clearTimeout(idleTimer);
  idleTimer = setTimeout(showPreface, IDLE_MS);
}

/* ─────────────────────────────────────────────────────────────────────
   SCRUBBER IDLE FADE
───────────────────────────────────────────────────────────────────── */
let scrubberIdleTimer = null;
const SCRUB_IDLE_MS   = 3000;

function resetScrubberIdle() {
  document.querySelectorAll('.video-scrubber.scrub-idle')
    .forEach(s => s.classList.remove('scrub-idle'));
  clearTimeout(scrubberIdleTimer);
  scrubberIdleTimer = setTimeout(() => {
    document.querySelectorAll('.video-scrubber.visible')
      .forEach(s => s.classList.add('scrub-idle'));
  }, SCRUB_IDLE_MS);
}

/* ─────────────────────────────────────────────────────────────────────
   INTRO REVEAL
───────────────────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => document.getElementById('ey').classList.add('reveal'), 300);
  setTimeout(() => document.getElementById('it').classList.add('reveal'), 500);
  setTimeout(() => document.getElementById('is').classList.add('reveal'), 700);
  setTimeout(() => document.getElementById('id').classList.add('reveal'), 900);
  setTimeout(() => document.getElementById('enter-btn').classList.add('reveal'), 1100);
});

/* ─────────────────────────────────────────────────────────────────────
   ENTER BUTTON + HISTORY API
───────────────────────────────────────────────────────────────────── */
const intro   = document.getElementById('intro');
const backBtn = document.getElementById('back-btn');
let pushedState = false;

document.getElementById('enter-btn').addEventListener('click', () => {
  soundOn = true; activeAudio = 'ambient';
  soundBtn.textContent = 'Sound — on'; soundBtn.classList.add('on');
  ambientAudio.volume = 0;
  ambientAudio.play().then(() => fadeTo(ambientAudio, 1, 2500)).catch(()=>{});
  vid1.volume = 0; vid2.volume = 0; vid1.load(); vid2.load();

  history.pushState({ page: 'experience' }, '', '#experience');
  pushedState = true;
  document.body.classList.add('unlocked');

  intro.style.opacity = '0';
  setTimeout(() => { intro.style.display = 'none'; entered = true; }, 1400);
  setTimeout(() => backBtn.classList.add('visible'), 2000);
  setTimeout(() => {
    showPreface();
    idleTimer = setTimeout(showPreface, IDLE_MS);
  }, 2200);
});

/* ─────────────────────────────────────────────────────────────────────
   RESET
───────────────────────────────────────────────────────────────────── */
function doReset() {
  pushedState = false; tilesEnabled = false; prefaceShownOnce = false;
  fadeTo(ambientAudio, 0, 600); fadeTo(vid1, 0, 600); fadeTo(vid2, 0, 600);
  setTimeout(() => {
    ambientAudio.pause(); ambientAudio.currentTime = 0;
    vid1.pause(); vid1.currentTime = 0; vid2.pause(); vid2.currentTime = 0;
  }, 650);
  soundOn = false; activeAudio = null;
  soundBtn.textContent = 'Sound — off'; soundBtn.classList.remove('on');
  vid1Playing = false; vid2Playing = false;
  document.getElementById('play-prompt1').classList.remove('gone','visible');
  document.getElementById('play-prompt2').classList.remove('gone','visible');
  document.getElementById('scrubber1').classList.remove('visible','scrub-idle');
  document.getElementById('scrubber2').classList.remove('visible','scrub-idle');
  ['scrub-fill1','scrub-fill2'].forEach(id => document.getElementById(id).style.width = '0%');
  ['scrub-thumb1','scrub-thumb2'].forEach(id => document.getElementById(id).style.left = '0%');
  ['scrub-time1','scrub-time2'].forEach(id => document.getElementById(id).textContent = '0:00');
  setScrubIcon('scrub-pp-icon1', false); setScrubIcon('scrub-pp-icon2', false);
  document.querySelectorAll('.section-video').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.bubble').forEach(b => b.remove());
  tiles = [];
  document.body.classList.remove('unlocked');
  window.scrollTo(0, 0); lastScrollY = 0;
  entered = false;
  clearTimeout(idleTimer); clearTimeout(scrubberIdleTimer);
  hidePreface();
  explorePrompt.classList.remove('brief');
  explorePrompt.style.opacity = '';
  backBtn.classList.remove('visible');
  intro.style.display = '';
  requestAnimationFrame(() => requestAnimationFrame(() => { intro.style.opacity = '1'; }));
  history.replaceState(null, '', location.pathname + location.search);
}

backBtn.addEventListener('click', () => { if (pushedState) history.back(); else doReset(); });
window.addEventListener('popstate', () => { if (location.hash !== '#experience') doReset(); });

/* ─────────────────────────────────────────────────────────────────────
   CLICK TO REVEAL TILES
───────────────────────────────────────────────────────────────────── */
document.addEventListener('click', e => {
  if (!entered) return;
  if (!tilesEnabled) {
    hidePreface();
    tilesEnabled = true;
    clearTimeout(idleTimer);
    idleTimer = setTimeout(showPreface, IDLE_MS);
  }
  if (!isInExploreZone()) return;
  mx = e.clientX; my = e.clientY;
  makeTile();
  setTimeout(() => makeTile(), 90);
  if (Math.random() > 0.4) setTimeout(() => makeTile(), 200);
});

/* ─────────────────────────────────────────────────────────────────────
   PLAY BUTTONS
───────────────────────────────────────────────────────────────────── */
let vid1Playing = false, vid2Playing = false;

document.getElementById('play-btn1').addEventListener('click', () => {
  if (vid1Playing) return;
  vid1Playing = true; unlockScroll();
  document.getElementById('play-prompt1').classList.add('gone');
  setTimeout(() => document.getElementById('scrubber1').classList.add('visible'), 1000);
  vid1.play().catch(()=>{});
  crossfadeTo('vid1');
});

document.getElementById('play-btn2').addEventListener('click', () => {
  if (vid2Playing) return;
  vid2Playing = true; unlockScroll();
  document.getElementById('play-prompt2').classList.add('gone');
  setTimeout(() => document.getElementById('scrubber2').classList.add('visible'), 1000);
  vid2.play().catch(()=>{});
  crossfadeTo('vid2');
});

/* ─────────────────────────────────────────────────────────────────────
   INTERSECTION OBSERVER
───────────────────────────────────────────────────────────────────── */
const wrapObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const isWrap1    = entry.target.id === 'wrap1';
    const section    = document.getElementById(isWrap1 ? 'section1'    : 'section2');
    const promptId   = isWrap1 ? 'play-prompt1' : 'play-prompt2';
    const scrubberId = isWrap1 ? 'scrubber1'    : 'scrubber2';
    const isPlayed   = isWrap1 ? vid1Playing     : vid2Playing;
    const vidEl      = isWrap1 ? vid1            : vid2;
    const vidKey     = isWrap1 ? 'vid1'          : 'vid2';

    if (entry.isIntersecting) {
      section.querySelector('.section-video').classList.add('active');
      if (!isPlayed) {
        setTimeout(() => document.getElementById(promptId).classList.add('visible'), 600);
      } else {
        vidEl.play().catch(() => {});
        activeAudio = null; crossfadeTo(vidKey);
        document.getElementById(scrubberId).classList.add('visible');
      }
      document.getElementById('prog-label').textContent = isWrap1 ? 'i' : 'ii';
      clearTimeout(idleTimer);
      hidePreface();
    } else {
      if (!isPlayed) {
        section.querySelector('.section-video').classList.remove('active');
        document.getElementById(promptId).classList.remove('visible');
      }
      document.getElementById(scrubberId).classList.remove('visible','scrub-idle');
      if (activeAudio === vidKey) crossfadeTo('ambient');
      if (entered && tilesEnabled) {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(showPreface, IDLE_MS);
      }
    }
  });
}, { threshold: 0.1 });

wrapObserver.observe(document.getElementById('wrap1'));
wrapObserver.observe(document.getElementById('wrap2'));

/* ─────────────────────────────────────────────────────────────────────
   VIDEO SCRUBBERS
───────────────────────────────────────────────────────────────────── */
function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}
function setScrubIcon(iconId, isPlaying) {
  const el = document.getElementById(iconId); if (!el) return;
  el.innerHTML = isPlaying
    ? `<rect x="3" y="2" width="3.5" height="12" rx="1" fill="rgba(255,255,255,0.8)"/>
       <rect x="9.5" y="2" width="3.5" height="12" rx="1" fill="rgba(255,255,255,0.8)"/>`
    : `<polygon points="3,1 15,8 3,15" fill="rgba(255,255,255,0.8)"/>`;
}
function setupScrubber(vidEl, ppBtnEl, ppIconId, trackEl, fillEl, thumbEl, timeEl) {
  vidEl.addEventListener('play',  () => setScrubIcon(ppIconId, true));
  vidEl.addEventListener('pause', () => setScrubIcon(ppIconId, false));
  vidEl.addEventListener('ended', () => setScrubIcon(ppIconId, false));
  vidEl.addEventListener('timeupdate', () => {
    if (!vidEl.duration) return;
    const pct = (vidEl.currentTime / vidEl.duration * 100).toFixed(2);
    fillEl.style.width = pct+'%'; thumbEl.style.left = pct+'%';
    timeEl.textContent = formatTime(vidEl.currentTime);
  });
  ppBtnEl.addEventListener('click', () => {
    if (vidEl.paused) { vidEl.play().catch(()=>{}); activeAudio = null; crossfadeTo(vidEl === vid1 ? 'vid1' : 'vid2'); }
    else { vidEl.pause(); crossfadeTo('ambient'); }
  });
  let dragging = false;
  function seekTo(e) {
    if (!vidEl.duration) return;
    const rect = trackEl.getBoundingClientRect();
    vidEl.currentTime = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * vidEl.duration;
  }
  trackEl.addEventListener('mousedown', e => { dragging = true; e.preventDefault(); seekTo(e); });
  document.addEventListener('mousemove', e => { if (dragging) seekTo(e); });
  document.addEventListener('mouseup',   () => { dragging = false; });
}

setupScrubber(vid1, document.getElementById('scrub-pp1'), 'scrub-pp-icon1',
  document.getElementById('scrub-track1'), document.getElementById('scrub-fill1'),
  document.getElementById('scrub-thumb1'), document.getElementById('scrub-time1'));
setupScrubber(vid2, document.getElementById('scrub-pp2'), 'scrub-pp-icon2',
  document.getElementById('scrub-track2'), document.getElementById('scrub-fill2'),
  document.getElementById('scrub-thumb2'), document.getElementById('scrub-time2'));

/* ─────────────────────────────────────────────────────────────────────
   SCROLL GATES
───────────────────────────────────────────────────────────────────── */
let lastScrollY = 0, isLocked = false;
const progFill  = document.getElementById('prog-fill');

function gatePos(wrapId) {
  const wrap = document.getElementById(wrapId); if (!wrap) return 0;
  return wrap.offsetTop + wrap.offsetHeight * 0.5;
}
function nudgeBtn(id) {
  const btn = document.getElementById(id); if (!btn) return;
  btn.classList.remove('nudge'); requestAnimationFrame(() => btn.classList.add('nudge'));
}
function lockAtGate(wrapId, btnId) {
  isLocked = true;
  window.scrollTo({ top: gatePos(wrapId), behavior: 'instant' });
  document.body.classList.add('gate-locked');
  nudgeBtn(btnId);
}
function unlockScroll() { isLocked = false; document.body.classList.remove('gate-locked'); }

window.addEventListener('wheel', e => {
  if (isLocked && e.deltaY < 0) { unlockScroll(); window.scrollBy(0, -10); }
});
let touchStart = 0;
window.addEventListener('touchstart', e => { touchStart = e.touches[0].pageY; });
window.addEventListener('touchmove',  e => { if (isLocked && e.touches[0].pageY > touchStart + 10) unlockScroll(); });
window.onbeforeunload = () => window.scrollTo(0, 0);
window.addEventListener('load', () => {
  window.scrollTo(0, 0);
  document.body.classList.remove('gate-locked', 'unlocked');
});

window.addEventListener('scroll', () => {
  if (isLocked) return;
  const scrollY       = window.scrollY;
  const scrollingDown = scrollY > lastScrollY;

  if (tilesEnabled && !isInExploreZone()) hidePreface();
  if (scrollY < 10 && entered && tilesEnabled && !isInChapterSection()) {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(showPreface, 400);
  }

  if (scrollingDown && !vid1Playing && scrollY >= gatePos('wrap1')) { lockAtGate('wrap1','play-btn1'); return; }
  if (scrollingDown && !vid2Playing && scrollY >= gatePos('wrap2')) { lockAtGate('wrap2','play-btn2'); return; }

  const total = document.body.scrollHeight - window.innerHeight;
  if (total > 0) progFill.style.height = (scrollY / total * 100) + '%';
  lastScrollY = scrollY;
});

let srcQueue = [];
function nextSrc() {
  if (!srcQueue.length) {
    srcQueue = [...bubbleSrcs];
    for (let i = srcQueue.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [srcQueue[i], srcQueue[j]] = [srcQueue[j], srcQueue[i]];
    }
  }
  return srcQueue.pop();
}

let tiles = [], maxTiles = 5;

function makeTile() {
  const el  = document.createElement('div');
  el.className = 'bubble';
  const w   = 160 + Math.random() * 220;
  const ox  = (Math.random() - 0.5) * 500;
  const oy  = (Math.random() - 0.5) * 380;
  el.style.cssText = `width:${w}px; left:${mx - w/2 + ox}px; top:${my + window.scrollY + oy}px;`;

  const v = document.createElement('video');
  v.src = nextSrc(); v.loop = true; v.muted = true; v.autoplay = true; v.playsInline = true;
  el.appendChild(v); document.body.appendChild(el);
  v.play().catch(() => {});
  requestAnimationFrame(() => el.classList.add('visible'));

  const life = 3000 + Math.random() * 2500;
  setTimeout(() => {
    el.style.transition = 'opacity .9s ease, transform .9s ease, filter .9s ease';
    el.style.opacity = '0'; el.style.transform = 'scale(.82) translateY(8px)'; el.style.filter = 'blur(4px)';
    setTimeout(() => { el.remove(); tiles = tiles.filter(t => t !== el); }, 950);
  }, life);

  tiles.push(el);
  if (tiles.length > maxTiles) {
    const old = tiles.shift(); old.style.opacity = '0';
    setTimeout(() => old.remove(), 950);
  }
}
